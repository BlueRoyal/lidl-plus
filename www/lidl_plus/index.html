<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lidl Plus</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .tab { display: none !important; }
  .tab.active { display: block !important; }
  .tab-btn { padding: 13px 18px; border: none; background: none; cursor: pointer; font-size: 14px; font-weight: 500; color: #6b7280; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.2s; white-space: nowrap; }
  .tab-btn:hover { color: #003882; }
  .tab-btn.active { color: #003882; border-bottom-color: #003882; }
  .receipt-items { display: none; }
  .receipt-items.open { display: block; }
  .chevron { transition: transform 0.2s; display: inline-block; }
  .chevron.open { transform: rotate(90deg); }
  .modal-overlay { display: none; }
  .modal-overlay.open { display: flex; }
  .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
</style>
</head>
<body class="bg-gray-100 text-gray-900 text-sm">

<!-- ── HEADER ─────────────────────────────────────────────────────────────── -->
<header class="bg-[#003882] text-white px-5 py-3.5 flex items-center gap-3 sticky top-0 z-50 shadow-xl">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
    <path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM5.17 5H2V3H0v2h2l3.6 7.59-1.35 2.44C4.09 15.31 4 15.64 4 16c0 1.1.9 2 2 2h14v-2H6.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63H19c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0023.46 5H5.17z"/>
  </svg>
  <h1 class="text-lg font-semibold tracking-tight">Lidl Plus</h1>
  <span class="ml-auto text-xs opacity-70 shrink-0" id="syncInfo">Lade…</span>
</header>

<!-- ── NAVIGATION ────────────────────────────────────────────────────────── -->
<nav class="bg-white border-b-2 border-gray-200 px-4 flex overflow-x-auto">
  <button class="tab-btn active" onclick="showTab('overview',this)">📊 Übersicht</button>
  <button class="tab-btn" onclick="showTab('receipts',this)">🧾 Kassenbons</button>
  <button class="tab-btn" onclick="showTab('products',this)">📦 Artikel</button>
</nav>

<div class="max-w-7xl mx-auto px-4 py-5">

<!-- ══════════════════════════════════════════════════════════════════════════
     TAB: ÜBERSICHT
══════════════════════════════════════════════════════════════════════════ -->
<div id="tab-overview" class="tab active">

  <!-- KPI-Karten -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5" id="overviewCards">
    <div class="bg-white rounded-2xl p-4 shadow-sm text-center animate-pulse">
      <div class="h-7 bg-gray-100 rounded mb-2 mx-4"></div>
      <div class="h-3 bg-gray-100 rounded mx-6"></div>
    </div>
  </div>

  <!-- Monatliche Ausgaben -->
  <div class="bg-white rounded-2xl p-5 shadow-sm mb-4">
    <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-4">📅 Ausgaben pro Monat</h2>
    <div style="height:260px;position:relative"><canvas id="chartMonthly"></canvas></div>
  </div>

  <!-- Kategorie + Filialen -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div class="bg-white rounded-2xl p-5 shadow-sm">
      <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-4">🥦 Ausgaben nach Kategorie</h2>
      <div style="height:240px;position:relative"><canvas id="chartCategory"></canvas></div>
    </div>
    <div class="bg-white rounded-2xl p-5 shadow-sm">
      <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-4">🏪 Top Filialen</h2>
      <div style="height:240px;position:relative"><canvas id="chartStores"></canvas></div>
    </div>
  </div>

</div>

<!-- ══════════════════════════════════════════════════════════════════════════
     TAB: KASSENBONS
══════════════════════════════════════════════════════════════════════════ -->
<div id="tab-receipts" class="tab">

  <!-- Filter-Panel -->
  <div class="bg-white rounded-2xl p-4 shadow-sm mb-4">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
      <input type="text" id="receiptSearch" placeholder="🔍 Filiale oder Artikel…"
             class="border border-gray-200 rounded-xl px-3 py-2 outline-none focus:border-[#003882] transition-colors"
             oninput="filterReceipts()">
      <select id="receiptStore"
              class="border border-gray-200 rounded-xl px-3 py-2 outline-none focus:border-[#003882] bg-white"
              onchange="filterReceipts()">
        <option value="">Alle Filialen</option>
      </select>
      <select id="receiptSort"
              class="border border-gray-200 rounded-xl px-3 py-2 outline-none focus:border-[#003882] bg-white"
              onchange="filterReceipts()">
        <option value="date-desc">Neueste zuerst</option>
        <option value="date-asc">Älteste zuerst</option>
        <option value="total-desc">Höchster Betrag</option>
        <option value="total-asc">Niedrigster Betrag</option>
      </select>
      <div class="flex gap-2">
        <input type="number" id="receiptMin" placeholder="Min €" step="0.01" min="0"
               class="border border-gray-200 rounded-xl px-3 py-2 outline-none focus:border-[#003882] w-full"
               oninput="filterReceipts()">
        <input type="number" id="receiptMax" placeholder="Max €" step="0.01" min="0"
               class="border border-gray-200 rounded-xl px-3 py-2 outline-none focus:border-[#003882] w-full"
               oninput="filterReceipts()">
      </div>
      <input type="date" id="receiptFrom"
             class="border border-gray-200 rounded-xl px-3 py-2 outline-none focus:border-[#003882]"
             onchange="filterReceipts()">
      <input type="date" id="receiptTo"
             class="border border-gray-200 rounded-xl px-3 py-2 outline-none focus:border-[#003882]"
             onchange="filterReceipts()">
    </div>
    <p class="mt-2.5 text-xs text-gray-400" id="receiptCount"></p>
  </div>

  <div id="receiptList" class="text-center py-16 text-gray-400">Lade Kassenbons…</div>

</div>

<!-- ══════════════════════════════════════════════════════════════════════════
     TAB: ARTIKEL
══════════════════════════════════════════════════════════════════════════ -->
<div id="tab-products" class="tab">

  <!-- KPI-Karten -->
  <div class="grid grid-cols-3 gap-3 mb-4" id="productStats"></div>

  <!-- Filter-Panel -->
  <div class="bg-white rounded-2xl p-4 shadow-sm mb-4">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
      <input type="text" id="productSearch" placeholder="🔍 Artikel suchen…"
             class="border border-gray-200 rounded-xl px-3 py-2 outline-none focus:border-[#003882]"
             oninput="filterProducts()">
      <select id="productSort"
              class="border border-gray-200 rounded-xl px-3 py-2 outline-none focus:border-[#003882] bg-white"
              onchange="filterProducts()">
        <option value="count-desc">Häufig gekauft</option>
        <option value="spent-desc">Meiste Ausgaben</option>
        <option value="name-asc">Name A–Z</option>
        <option value="last-desc">Zuletzt gekauft</option>
        <option value="price-desc">Höchster Preis</option>
        <option value="price-asc">Niedrigster Preis</option>
      </select>
      <select id="productTrend"
              class="border border-gray-200 rounded-xl px-3 py-2 outline-none focus:border-[#003882] bg-white"
              onchange="filterProducts()">
        <option value="">Alle Preistrends</option>
        <option value="up">↑ Preis gestiegen</option>
        <option value="down">↓ Preis gesunken</option>
        <option value="stable">→ Preis stabil</option>
      </select>
      <select id="productPeriod"
              class="border border-gray-200 rounded-xl px-3 py-2 outline-none focus:border-[#003882] bg-white"
              onchange="filterProducts()">
        <option value="">Alle Zeiträume</option>
        <option value="30">Letzte 30 Tage</option>
        <option value="90">Letzte 90 Tage</option>
        <option value="180">Letzte 6 Monate</option>
        <option value="365">Letztes Jahr</option>
      </select>
    </div>
    <p class="mt-2.5 text-xs text-gray-400" id="productCount"></p>
  </div>

  <div id="productGrid" class="text-center py-16 text-gray-400">Lade Artikel…</div>

</div>

</div><!-- /max-w-7xl -->

<!-- ══════════════════════════════════════════════════════════════════════════
     PRODUKT-DETAIL MODAL
══════════════════════════════════════════════════════════════════════════ -->
<div class="modal-overlay fixed inset-0 bg-black/50 z-50 items-center justify-center p-4"
     id="productModal" onclick="closeModal(event)">
  <div class="bg-white rounded-2xl w-full max-w-xl max-h-[88vh] overflow-y-auto shadow-2xl">
    <div class="flex items-start justify-between px-6 pt-5 pb-3 sticky top-0 bg-white rounded-t-2xl border-b border-gray-100">
      <h2 class="text-base font-bold text-[#003882] pr-4 leading-tight" id="modalTitle"></h2>
      <button class="text-gray-400 hover:text-gray-700 text-2xl leading-none shrink-0 mt-[-2px]"
              onclick="document.getElementById('productModal').classList.remove('open');if(chartModal){chartModal.destroy();chartModal=null;}">×</button>
    </div>
    <div class="px-6 pb-6 pt-4">
      <div id="modalStats" class="grid grid-cols-3 gap-2 mb-5"></div>
      <div id="modalChartWrapper" style="position:relative;height:200px;margin-bottom:20px">
        <canvas id="modalPriceChart"></canvas>
      </div>
      <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Preishistorie</h3>
      <div id="modalHistory"></div>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let allReceipts = [], allProducts = [], appData = {};
let chartMonthly, chartCategory, chartStores, chartModal;

// ── Helpers ───────────────────────────────────────────────────────────────────
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmt = v => Number(v||0).toFixed(2) + ' €';

function fmtDate(s) {
  if (!s) return '–';
  const d = new Date(s);
  if (isNaN(d)) return String(s).slice(0,10);
  return d.toLocaleDateString('de-DE', {day:'2-digit', month:'2-digit', year:'numeric'});
}
function fmtDateTime(s) {
  if (!s) return '–';
  const d = new Date(s);
  if (isNaN(d)) return String(s).slice(0,16).replace('T',' ');
  return d.toLocaleString('de-DE', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'});
}

function getPriceTrend(p) {
  const hist = (p.price_history||[]).filter(h=>h.price>0);
  if (hist.length < 2) return 'stable';
  const prev = parseFloat(hist[hist.length-2].price);
  const curr = parseFloat(hist[hist.length-1].price);
  if (curr > prev * 1.005) return 'up';
  if (curr < prev * 0.995) return 'down';
  return 'stable';
}

// ── Data loading ──────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch('/local/lidl_plus/data.json?_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    appData = await res.json();
    allReceipts = appData.receipts || [];
    allProducts = appData.products || [];

    const syncTime = appData.last_sync
      ? new Date(appData.last_sync).toLocaleString('de-DE', {dateStyle:'short', timeStyle:'short'})
      : '–';
    document.getElementById('syncInfo').textContent = 'Stand: ' + syncTime;

    renderOverview();
    populateStoreFilter();
    filterReceipts();
    renderProductStats(allProducts);
    filterProducts();
  } catch(e) {
    ['receiptList','productGrid'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.innerHTML = `<div class="text-center py-16 text-red-500">⚠️ Daten konnten nicht geladen werden.<br><small class="text-gray-400">${e.message}</small></div>`;
    });
  }
}

// ── Tab navigation ────────────────────────────────────────────────────────────
function showTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

// ══════════════════════════════════════════════════════════════════════════════
// ÜBERSICHT
// ══════════════════════════════════════════════════════════════════════════════
function renderOverview() {
  const totalSpent = allReceipts.reduce((s,r)=>s+(r.total||0), 0);
  const avgBasket = appData.avg_basket || (allReceipts.length ? totalSpent/allReceipts.length : 0);
  const curMonth = appData.current_month || 0;

  document.getElementById('overviewCards').innerHTML = [
    {icon:'🧾', val:allReceipts.length,       label:'Kassenbons',           color:'text-[#003882]'},
    {icon:'📦', val:allProducts.length,        label:'Einzigartige Artikel', color:'text-purple-600'},
    {icon:'💶', val:fmt(totalSpent),           label:'Gesamtausgaben',       color:'text-green-600'},
    {icon:'🛒', val:fmt(avgBasket),            label:'Ø Einkauf',            color:'text-orange-500'},
  ].map(c=>`
    <div class="bg-white rounded-2xl p-4 shadow-sm text-center">
      <div class="text-2xl mb-1.5">${c.icon}</div>
      <div class="text-xl font-bold ${c.color}">${c.val}</div>
      <div class="text-xs text-gray-400 mt-1">${c.label}</div>
    </div>`).join('');

  renderMonthlyChart();
  renderCategoryChart();
  renderStoresChart();
}

function renderMonthlyChart() {
  let byMonth = appData.spending_by_month || {};
  if (!Object.keys(byMonth).length) {
    allReceipts.forEach(r => {
      const m = (r.date||'').slice(0,7);
      if (m) byMonth[m] = (byMonth[m]||0) + (r.total||0);
    });
  }
  const months = Object.keys(byMonth).sort().slice(-12);
  const values = months.map(m => byMonth[m]);
  const labels = months.map(m => {
    const [y,mo] = m.split('-');
    return new Date(+y, +mo-1, 1).toLocaleString('de-DE', {month:'short', year:'2-digit'});
  });
  const now = new Date().toISOString().slice(0,7);

  if (chartMonthly) chartMonthly.destroy();
  chartMonthly = new Chart(document.getElementById('chartMonthly'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: months.map(m => m===now ? '#ffed00' : 'rgba(0,56,130,0.75)'),
        borderColor:      months.map(m => m===now ? '#d4c400' : '#003882'),
        borderWidth: 1,
        borderRadius: 6,
      }]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}, tooltip:{callbacks:{label:c=>` ${fmt(c.raw)}`}}},
      scales:{
        y:{ticks:{callback:v=>v.toFixed(0)+'€'}, grid:{color:'#f3f4f6'}},
        x:{grid:{display:false}}
      }
    }
  });
}

function renderCategoryChart() {
  const food    = appData.food_total    || 0;
  const nonfood = appData.nonfood_total || 0;
  const total   = allReceipts.reduce((s,r)=>s+(r.total||0), 0);
  const unknown = Math.max(0, total - food - nonfood);

  if (chartCategory) chartCategory.destroy();
  chartCategory = new Chart(document.getElementById('chartCategory'), {
    type: 'doughnut',
    data: {
      labels: ['Lebensmittel (7%)', 'Non-Food (19%)', 'Sonstiges'],
      datasets: [{
        data: [food, nonfood, unknown],
        backgroundColor: ['#003882','#ffed00','#e5e7eb'],
        borderWidth: 2, borderColor:'#fff',
      }]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      cutout:'65%',
      plugins:{
        legend:{position:'bottom', labels:{font:{size:12}, padding:12}},
        tooltip:{callbacks:{label:c=>` ${fmt(c.raw)} (${((c.raw/(food+nonfood+unknown||1))*100).toFixed(1)}%)`}}
      }
    }
  });
}

function renderStoresChart() {
  let byStore = appData.spending_by_store || {};
  if (!Object.keys(byStore).length) {
    allReceipts.forEach(r => {
      if (r.store) byStore[r.store] = (byStore[r.store]||0) + (r.total||0);
    });
  }
  const sorted = Object.entries(byStore).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const labels = sorted.map(([k])=>k.length>22?k.slice(0,20)+'…':k);
  const values = sorted.map(([,v])=>v);

  if (chartStores) chartStores.destroy();
  chartStores = new Chart(document.getElementById('chartStores'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: 'rgba(0,56,130,0.75)',
        borderRadius: 5,
      }]
    },
    options: {
      indexAxis:'y',
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}, tooltip:{callbacks:{label:c=>` ${fmt(c.raw)}`}}},
      scales:{
        x:{ticks:{callback:v=>v.toFixed(0)+'€'}, grid:{color:'#f3f4f6'}},
        y:{grid:{display:false}}
      }
    }
  });
}

// ══════════════════════════════════════════════════════════════════════════════
// KASSENBONS
// ══════════════════════════════════════════════════════════════════════════════
function populateStoreFilter() {
  const stores = [...new Set(allReceipts.map(r=>r.store).filter(Boolean))].sort();
  const sel = document.getElementById('receiptStore');
  // Keep first "Alle Filialen" option
  while (sel.options.length > 1) sel.remove(1);
  stores.forEach(s => { const o=document.createElement('option'); o.value=s; o.textContent=s; sel.appendChild(o); });
}

function filterReceipts() {
  const q     = document.getElementById('receiptSearch').value.toLowerCase();
  const sort  = document.getElementById('receiptSort').value;
  const store = document.getElementById('receiptStore').value;
  const minV  = parseFloat(document.getElementById('receiptMin').value) || 0;
  const maxV  = parseFloat(document.getElementById('receiptMax').value) || Infinity;
  const from  = document.getElementById('receiptFrom').value;
  const to    = document.getElementById('receiptTo').value;

  let filtered = allReceipts.filter(r => {
    if (store && r.store !== store) return false;
    if (r.total < minV || r.total > maxV) return false;
    if (from && (r.date||'').slice(0,10) < from) return false;
    if (to   && (r.date||'').slice(0,10) > to)   return false;
    if (q) {
      const inStore = (r.store||'').toLowerCase().includes(q);
      const inItems = (r.items||[]).some(i=>(i.name||'').toLowerCase().includes(q));
      if (!inStore && !inItems) return false;
    }
    return true;
  });

  filtered.sort((a,b) => {
    if (sort==='date-desc')  return (b.date||'').localeCompare(a.date||'');
    if (sort==='date-asc')   return (a.date||'').localeCompare(b.date||'');
    if (sort==='total-desc') return b.total - a.total;
    if (sort==='total-asc')  return a.total - b.total;
    return 0;
  });

  const sum = filtered.reduce((s,r)=>s+r.total, 0);
  document.getElementById('receiptCount').textContent =
    `${filtered.length} von ${allReceipts.length} Kassenbons · Summe: ${fmt(sum)}`;

  renderReceipts(filtered);
}

function renderReceipts(receipts) {
  const el = document.getElementById('receiptList');
  if (!receipts.length) {
    el.innerHTML = '<div class="text-center py-16 text-gray-400">Keine Kassenbons gefunden.</div>';
    return;
  }
  el.innerHTML = receipts.map(r => {
    const items = r.items||[];
    const rows = items.map(i => {
      const price = parseFloat(String(i.unit_price||0).replace(',','.'));
      const qty   = parseFloat(String(i.quantity||1).replace(',','.'));
      const line  = (price*qty).toFixed(2);
      return `<tr class="border-t border-gray-50 hover:bg-gray-50/70">
        <td class="px-4 py-2.5 text-gray-800">${esc(i.name||i.id)}</td>
        <td class="px-4 py-2.5 text-gray-500 text-right">${qty}</td>
        <td class="px-4 py-2.5 text-gray-500 text-right">${price?price.toFixed(2)+' €':'–'}</td>
        <td class="px-4 py-2.5 font-semibold text-right">${price?line+' €':'–'}</td>
      </tr>`;
    }).join('');

    return `<div class="bg-white rounded-2xl shadow-sm mb-2 overflow-hidden">
      <div class="flex items-center gap-3 px-4 py-3.5 cursor-pointer hover:bg-gray-50 select-none"
           onclick="toggleReceipt(this)">
        <span class="font-semibold text-[#003882] whitespace-nowrap text-sm">${fmtDate(r.date)}</span>
        <span class="flex-1 text-gray-600 truncate">${esc(r.store||'Unbekannt')}</span>
        <span class="font-bold text-green-600 whitespace-nowrap">${fmt(r.total)}</span>
        <span class="text-xs text-gray-400 whitespace-nowrap hidden sm:inline">${items.length} Artikel</span>
        <span class="chevron text-gray-400 text-lg leading-none">›</span>
      </div>
      <div class="receipt-items border-t border-gray-100">
        <table class="w-full text-sm">
          <thead><tr class="bg-gray-50 text-xs text-gray-400 uppercase tracking-wide">
            <th class="px-4 py-2 text-left font-medium">Artikel</th>
            <th class="px-4 py-2 text-right font-medium">Menge</th>
            <th class="px-4 py-2 text-right font-medium">Einzelpreis</th>
            <th class="px-4 py-2 text-right font-medium">Gesamt</th>
          </tr></thead>
          <tbody>${rows||'<tr><td colspan="4" class="px-4 py-5 text-center text-gray-400">Keine Artikel</td></tr>'}</tbody>
        </table>
      </div>
    </div>`;
  }).join('');
}

function toggleReceipt(header) {
  const items   = header.nextElementSibling;
  const chevron = header.querySelector('.chevron');
  items.classList.toggle('open');
  chevron.classList.toggle('open');
}

// ══════════════════════════════════════════════════════════════════════════════
// ARTIKEL
// ══════════════════════════════════════════════════════════════════════════════
function renderProductStats(products) {
  const totalSpent = products.reduce((s,p)=>s+p.total_spent, 0);
  const totalBuys  = products.reduce((s,p)=>s+p.purchase_count, 0);
  document.getElementById('productStats').innerHTML = [
    {val:products.length,    label:'Einzigartige Artikel', color:'text-[#003882]'},
    {val:totalBuys,          label:'Käufe gesamt',          color:'text-purple-600'},
    {val:fmt(totalSpent),    label:'Gesamtausgaben',        color:'text-green-600'},
  ].map(c=>`
    <div class="bg-white rounded-2xl p-4 shadow-sm text-center">
      <div class="text-lg font-bold ${c.color}">${c.val}</div>
      <div class="text-xs text-gray-400 mt-0.5">${c.label}</div>
    </div>`).join('');
}

function filterProducts() {
  const q      = document.getElementById('productSearch').value.toLowerCase();
  const sort   = document.getElementById('productSort').value;
  const trend  = document.getElementById('productTrend').value;
  const period = parseInt(document.getElementById('productPeriod').value)||0;
  const cutoff = period ? new Date(Date.now()-period*864e5).toISOString().slice(0,10) : '';

  let filtered = allProducts.filter(p => {
    if (q && !p.name.toLowerCase().includes(q)) return false;
    if (trend && getPriceTrend(p) !== trend) return false;
    if (cutoff && (p.last_date||'').slice(0,10) < cutoff) return false;
    return true;
  });

  filtered.sort((a,b) => {
    if (sort==='count-desc') return b.purchase_count - a.purchase_count;
    if (sort==='spent-desc') return b.total_spent - a.total_spent;
    if (sort==='name-asc')   return a.name.localeCompare(b.name,'de');
    if (sort==='last-desc')  return (b.last_date||'').localeCompare(a.last_date||'');
    if (sort==='price-desc') return b.last_price - a.last_price;
    if (sort==='price-asc')  return a.last_price - b.last_price;
    return 0;
  });

  document.getElementById('productCount').textContent =
    `${filtered.length} von ${allProducts.length} Artikeln`;
  renderProducts(filtered);
}

function renderProducts(products) {
  const el = document.getElementById('productGrid');
  if (!products.length) {
    el.className = 'text-center py-16 text-gray-400';
    el.innerHTML = 'Keine Artikel gefunden.';
    return;
  }
  el.className = 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3';
  el.innerHTML = products.map(p => {
    const trend = getPriceTrend(p);
    const trendBadge = trend==='up'
      ? '<span class="text-[11px] bg-red-100 text-red-600 rounded-full px-2 py-0.5 font-semibold">↑ teurer</span>'
      : trend==='down'
      ? '<span class="text-[11px] bg-green-100 text-green-600 rounded-full px-2 py-0.5 font-semibold">↓ günstiger</span>'
      : '';
    return `
      <div class="bg-white rounded-2xl p-4 shadow-sm cursor-pointer hover:shadow-md transition-shadow"
           onclick="showProductDetail('${p.id.replace(/'/g,"\\'")}')">
        <div class="font-semibold text-gray-800 leading-tight line-clamp-2 mb-2" style="min-height:2.6em">
          ${esc(p.name||p.id)}
        </div>
        ${trendBadge?`<div class="mb-2.5">${trendBadge}</div>`:'<div class="mb-2.5 h-5"></div>'}
        <div class="grid grid-cols-2 gap-1.5 text-center">
          <div class="bg-gray-50 rounded-xl py-2">
            <div class="text-base font-bold text-[#003882]">${p.purchase_count}×</div>
            <div class="text-[10px] text-gray-400 uppercase tracking-wide mt-0.5">Käufe</div>
          </div>
          <div class="bg-gray-50 rounded-xl py-2">
            <div class="text-base font-bold text-green-600">${p.last_price.toFixed(2)} €</div>
            <div class="text-[10px] text-gray-400 uppercase tracking-wide mt-0.5">Akt. Preis</div>
          </div>
          <div class="bg-gray-50 rounded-xl py-2">
            <div class="text-base font-bold text-gray-700">${p.avg_price.toFixed(2)} €</div>
            <div class="text-[10px] text-gray-400 uppercase tracking-wide mt-0.5">Ø Preis</div>
          </div>
          <div class="bg-gray-50 rounded-xl py-2">
            <div class="text-base font-bold text-gray-700">${p.total_spent.toFixed(2)} €</div>
            <div class="text-[10px] text-gray-400 uppercase tracking-wide mt-0.5">Gesamt</div>
          </div>
        </div>
        <div class="mt-2.5 text-xs text-gray-400 text-center">${fmtDate(p.last_date)}</div>
      </div>`;
  }).join('');
}

// ── Produkt-Detail Modal ──────────────────────────────────────────────────────
function showProductDetail(id) {
  const p = allProducts.find(x => x.id === id);
  if (!p) return;

  if (chartModal) { chartModal.destroy(); chartModal = null; }

  const trend = getPriceTrend(p);
  const trendLabel = trend==='up' ? ' ↑ teurer' : trend==='down' ? ' ↓ günstiger' : '';
  const trendColor = trend==='up' ? 'text-red-500' : trend==='down' ? 'text-green-500' : 'text-gray-500';

  document.getElementById('modalTitle').textContent = p.name || p.id;

  document.getElementById('modalStats').innerHTML = [
    {label:'Käufe gesamt',    val:p.purchase_count+'×'},
    {label:'Menge gesamt',    val:p.total_quantity},
    {label:'Ausgaben gesamt', val:fmt(p.total_spent)},
    {label:'Ø Preis',         val:fmt(p.avg_price)},
    {label:'Akt. Preis',      val:`<span class="font-bold ${trendColor}">${fmt(p.last_price)}${trendLabel}</span>`},
    {label:'Zuletzt',         val:fmtDate(p.last_date)},
  ].map(s=>`
    <div class="bg-gray-50 rounded-xl p-2.5 text-center">
      <div class="text-[10px] text-gray-400 uppercase tracking-wide">${s.label}</div>
      <div class="font-semibold text-gray-800 mt-0.5 text-sm">${s.val}</div>
    </div>`).join('');

  const hist = (p.price_history||[]).filter(h=>h.price>0);
  const wrapper = document.getElementById('modalChartWrapper');

  if (hist.length > 1) {
    wrapper.style.display = 'block';
    chartModal = new Chart(document.getElementById('modalPriceChart'), {
      type:'line',
      data:{
        labels: hist.map(h=>fmtDate(h.date)),
        datasets:[{
          label:'Preis (€)',
          data: hist.map(h=>parseFloat(h.price)),
          borderColor:'#003882',
          backgroundColor:'rgba(0,56,130,0.07)',
          fill:true,
          tension:0.35,
          pointRadius:4,
          pointBackgroundColor:'#003882',
          pointBorderColor:'#fff',
          pointBorderWidth:2,
        }]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:false}, tooltip:{callbacks:{label:c=>` ${c.raw.toFixed(2)} €`}}},
        scales:{
          y:{ticks:{callback:v=>v.toFixed(2)+'€'}, grid:{color:'#f3f4f6'}},
          x:{grid:{display:false}, ticks:{maxRotation:40, font:{size:11}}}
        }
      }
    });
  } else {
    wrapper.style.display = 'none';
  }

  document.getElementById('modalHistory').innerHTML = hist.length
    ? hist.slice().reverse().map(h=>`
        <div class="flex justify-between items-center py-2.5 border-b border-gray-50 text-sm last:border-0">
          <span class="text-gray-500 shrink-0">${fmtDate(h.date)}</span>
          <span class="text-gray-400 text-xs truncate mx-3 flex-1">${esc(h.store||'')}</span>
          <span class="font-semibold text-gray-800 shrink-0">${parseFloat(h.price).toFixed(2)} €</span>
        </div>`).join('')
    : '<p class="text-center py-4 text-gray-400 text-sm">Keine Preishistorie verfügbar</p>';

  document.getElementById('productModal').classList.add('open');
}

function closeModal(e) {
  if (e.target.id === 'productModal') {
    document.getElementById('productModal').classList.remove('open');
    if (chartModal) { chartModal.destroy(); chartModal = null; }
  }
}

loadData();
setInterval(loadData, 5 * 60 * 1000);
</script>
